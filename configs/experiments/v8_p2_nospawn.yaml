# v7 DEFAULT (cut 2026-07-11; P2 unchanged from v6 — the C1/C2 fixes are code-side).
# per-fix variants live in configs/experiments/. Source: see pipeline_manifest sha256.
# Per-camera tracking (P2) configuration.
# Mirrors scripts/tracking/config.py::TrackingConfig defaults — every field is
# listed explicitly so the run manifest is self-documenting and tunable.
# Loaded by scripts.tracking.config.load_tracking_config (rejects unknown keys).

# Stage thresholds
stage1_confidence_threshold: 0.5
stage2_confidence_min: 0.1
cost_accept_threshold: 0.7
lowconf_can_spawn: false

# Cost-matrix weights
iou_alpha: 0.6
pose_beta: 0.4

# Pose vector
pose_keypoint_confidence_min: 0.3
min_shared_keypoints: 6
scale_min_frac_bbox_h: 0.05

# Spatial / motion gating
chi2_gate: 9.21
gate_bbox_factor: 1.5
gate_max_distance_px: 600.0
v_max_px_per_frame: 120.0

# Calibration-assisted ground-plane gating
frame_rate_fps: 50.0
ground_vmax_mps: 9.0
ground_gate_base_m: 4.0
ground_cost_weight: 0.15
ankle_confidence_min: 0.6
max_ankle_above_bbox_fraction: 0.25

# Dormant re-ID
pose_cosine_reid_threshold: 0.25
reid_ambiguity_margin: 0.05
dormant_max_frames: 60

# Kalman stability
kalman_cov_trace_max: 1000000.0

# Track confirmation
tentative_confirm_hits: 3
tentative_confirm_window: 5

# Pose gallery
pose_gallery_size: 30
gallery_repr: medoid
