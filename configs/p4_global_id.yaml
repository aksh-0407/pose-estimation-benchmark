frame_rate_fps: 50.0
kinematic_v_max_mps: 9.0

p4a:
  confirm_hits: 3
  lost_window_frames: 30
  bowler_lost_window_frames: 60
  chi2_gate_2dof: 5.991
  reentry_temporal_gate_frames: 120
  reentry_mahalanobis_gate: 5.991
  reentry_gap_scale_frames: 60.0
  reentry_kinematic_slack: 1.5
  role_latch_frames: 5
  cap_max_pos_var: 25.0
  confidence_high: 0.7
  confidence_discard: 0.3
  local_identity_mahalanobis_gate: 25.0
  role_params:
    bowler: {alpha: 2.0, sigma_a: 3.0, measurement_noise: 0.3}
    striker: {alpha: 1.5, sigma_a: 2.5, measurement_noise: 0.3}
    non_striker: {alpha: 0.5, sigma_a: 1.0, measurement_noise: 0.3}
    wicketkeeper: {alpha: 0.3, sigma_a: 0.5, measurement_noise: 0.2}
    umpire: {alpha: 0.2, sigma_a: 0.3, measurement_noise: 0.2}
    fielder: {alpha: 1.0, sigma_a: 2.0, measurement_noise: 0.4}
    unknown: {alpha: 1.0, sigma_a: 2.0, measurement_noise: 0.4}

p4b:
  # Merge only identities repeatedly co-associated by P3 geometry/appearance,
  # and only when their same-camera occupancy histories do not conflict.
  enabled: true
  cross_camera_min_frames: 30
  cross_camera_min_track_ratio: 0.5
  temporal_gate_frames: 120
  w_temporal: 0.1
  w_spatial: 1.0
  w_role: 100.0
  new_traj_cost_factor: 0.5
  velocity_continuity_weight: 0.5
  kinematic_slack: 1.5
  incompatible_role_pairs:
    - [bowler, wicketkeeper]
    - [striker, wicketkeeper]
    - [bowler, striker]
    - [bowler, non_striker]
    - [umpire, bowler]
    - [umpire, striker]
    - [umpire, wicketkeeper]
