schema_version: 1
model:
  id: yolo26x_pose
  name: Ultralytics YOLO26x-pose
  family: Ultralytics YOLO Pose
  role: fast_body17_fallback
  framework: ultralytics
  skeleton: coco_17
  input_size:
  - 640
  - 640
  checkpoint: models/yolo26x_pose/weights/yolo26x-pose.pt
  config: ultralytics_pose
  export_targets:
  - onnx
  - tensorrt
  - openvino
  - coreml
  - tflite
  license: AGPL-3.0 or enterprise license required for closed products
  status: verify_availability
  expected_strengths:
  - Production-friendly API and export path
  - Good fast baseline
  expected_risks:
  - Body-only COCO-17
  - License must be checked for commercial deployment
  sources:
  - https://docs.ultralytics.com/tasks/pose
environment:
  env_name: pose-lab
  profile: ultralytics_pose
  smoke_profile: ultralytics
  benchmark_runner: yolo
  checkpoint: models/yolo26x_pose/weights/yolo26x-pose.pt
  model_name: models/yolo26x_pose/weights/yolo26x-pose.pt
  smoke_image: external/mmpose/projects/rtmpose/examples/onnxruntime/human-pose.jpeg
  assets:
  - kind: url
    url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26x-pose.pt
    path: models/yolo26x_pose/weights/yolo26x-pose.pt
    required_for_smoke: true
  notes:
  - Ultralytics pose weights are mirrored from the official assets release so setup
    can prefetch them.
