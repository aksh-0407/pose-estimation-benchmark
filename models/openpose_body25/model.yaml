schema_version: 1
model:
  id: openpose_body25
  name: OpenPose BODY_25
  family: CMU OpenPose
  role: canonical_openpose_baseline
  framework: openpose
  skeleton: openpose_body25
  input_size: dynamic
  checkpoint: models/openpose_body25/weights/pose/body_25/pose_iter_584000.caffemodel
  config: models/openpose_body25/configs/openpose_body25.yaml
  export_targets:
  - openpose_json
  license: OpenPose license; verify terms for commercial use
  status: candidate
  expected_strengths:
  - Canonical bottom-up multi-person OpenPose baseline
  - BODY_25 includes body and foot keypoints
  - Outputs stable JSON for downstream benchmarking
  expected_risks:
  - C++/Caffe/CUDA setup is heavier than Python-only models
  - COCO model is faster to compare directly, but BODY_25 is the standard OpenPose
    default
  - Requires separate build/install validation per machine
  sources:
  - https://github.com/CMU-Perceptual-Computing-Lab/openpose
  - https://github.com/CMU-Perceptual-Computing-Lab/openpose/blob/master/doc/02_output.md
environment:
  env_name: cricket-openpose-body25
  profile: openpose_system
  smoke_profile: openpose
  skeleton: openpose_body25
  config: models/openpose_body25/configs/openpose_body25.yaml
  checkpoint: models/openpose_body25/weights/pose/body_25/pose_iter_584000.caffemodel
  smoke_image: external/mmpose/projects/rtmpose/examples/onnxruntime/human-pose.jpeg
  executable: external/openpose/build/examples/openpose/openpose.bin
  assets:
  - kind: url
    url: http://posefs1.perception.cs.cmu.edu/OpenPose/models/pose/body_25/pose_iter_584000.caffemodel
    fallback_urls:
    - https://huggingface.co/gaijingeek/openpose-models/resolve/main/pose/body_25/pose_iter_584000.caffemodel
    path: models/openpose_body25/weights/pose/body_25/pose_iter_584000.caffemodel
    required_for_smoke: true
  - kind: url
    url: https://raw.githubusercontent.com/CMU-Perceptual-Computing-Lab/openpose/master/models/pose/body_25/pose_deploy.prototxt
    path: models/openpose_body25/weights/pose/body_25/pose_deploy.prototxt
    required_for_smoke: true
  notes:
  - Official CMU OpenPose is a C++/Caffe application; this repo builds a CPU-only
    validation binary at external/openpose/build/examples/openpose/openpose.bin with
    scripts/setup_openpose.py.
  - Build GPU/CUDA OpenPose separately on benchmark machines when speed matters.
  - The CMU model host is tried first; a Hugging Face mirror is configured only as
    a fallback because the original host is often unavailable.
