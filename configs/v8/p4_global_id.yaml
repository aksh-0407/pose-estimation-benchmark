# v8.1 DEFAULT p4 (v8 + W9 colocated-id merge, 2026-07-14). Prior comments
# consolidated in configs/experiments history + fixes-log W9 entry.
frame_rate_fps: 50.0
kinematic_v_max_mps: 9.0
p4a:
  posture_gate_veto_z: 3.0
  reentry_posture_max_z: 3.0
  online_role_proxy: true
  use_measurement_covariance: true
  r_floor_m: 0.15
  r_ceiling_m: 0.8
  emit_kalman_posterior: true
  confirm_hits: 3
  lost_window_frames: 30
  bowler_lost_window_frames: 60
  chi2_gate_2dof: 5.991
  reentry_temporal_gate_frames: 120
  reentry_mahalanobis_gate: 5.991
  reentry_gap_scale_frames: 60.0
  reentry_kinematic_slack: 1.5
  role_latch_frames: 5
  cap_max_pos_var: 25.0
  confidence_high: 0.7
  confidence_discard: 0.15
  local_identity_mahalanobis_gate: 25.0
  ownership_ttl_frames: 50
  shadow_confirm_gate_m: 1.2
  shadow_confirm_override_hits: 30
  expected_roster_max: 15
  roster_cap_min_separation_m: 3.0
  pose_match_weight: 2.0
  pose_descriptor_ema: 0.15
  pose_min_updates: 5
  pose_min_shared_segments: 4
  pose_gate_veto_distance: 0.3
  reentry_pose_max_distance: 0.3
  adaptive_lost_window: true
  lost_window_max_frames: 90
  min_emit_frames: 30
  role_params:
    bowler:
      alpha: 2.0
      sigma_a: 3.0
      measurement_noise: 0.3
    striker:
      alpha: 1.5
      sigma_a: 2.5
      measurement_noise: 0.3
    non_striker:
      alpha: 0.5
      sigma_a: 1.0
      measurement_noise: 0.3
    wicketkeeper:
      alpha: 0.3
      sigma_a: 0.5
      measurement_noise: 0.2
    umpire:
      alpha: 0.2
      sigma_a: 0.3
      measurement_noise: 0.2
    fielder:
      alpha: 1.0
      sigma_a: 2.0
      measurement_noise: 0.4
    unknown:
      alpha: 1.0
      sigma_a: 2.0
      measurement_noise: 0.4
p4b:
  occupancy_bridge: true
  temporal_gate_frames_occupancy: 300
  occupancy_bridge_require_pose: true
  normalized_costs: true
  posture_stitch_max_z: 3.0
  w_posture: 0.5
  enabled: true
  cross_camera_min_frames: 30
  cross_camera_min_track_ratio: 0.5
  temporal_gate_frames: 120
  w_temporal: 0.1
  w_spatial: 1.0
  w_role: 100.0
  new_traj_cost_factor: 3.0
  pose_stitch_max_distance: 0.3
  w_pose: 2.0
  velocity_continuity_weight: 0.5
  kinematic_slack: 1.5
  incompatible_role_pairs:
  - - bowler
    - wicketkeeper
  - - striker
    - wicketkeeper
  - - bowler
    - striker
  - - bowler
    - non_striker
  - - umpire
    - bowler
  - - umpire
    - striker
  - - umpire
    - wicketkeeper
  colocated_merge: true
  colocated_radius_m: 0.75
  colocated_min_frames: 25
  colocated_posture_max_z: 3.0
